- defaults:
    link:
      create: true
      relink: true
      backup: true

- link:
    ~/.config/kitty: kitty
    ~/.config/nixos: nixos
    ~/.config/nixpkgs: nixpkgs
    ~/.doom.d: emacs
    ~/.nethackrc: nethack/.nethackrc
    ~/.ssh/config: ssh/config
    ~/.vimrc: vim/.vimrc
    ~/.zshrc: zsh/.zshrc
